<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
<defs>
  <!-- tile -->
  <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#1b2a44"/><stop offset="0.5" stop-color="#0f1c33"/><stop offset="1" stop-color="#070d1c"/>
  </linearGradient>
  <radialGradient id="bgglow" cx="0.5" cy="0.42" r="0.55">
    <stop offset="0" stop-color="#f59e0b" stop-opacity="0.55"/>
    <stop offset="0.45" stop-color="#b45309" stop-opacity="0.20"/>
    <stop offset="1" stop-color="#000000" stop-opacity="0"/>
  </radialGradient>
  <!-- metal amber head -->
  <linearGradient id="metal" x1="0.2" y1="0" x2="0.7" y2="1">
    <stop offset="0" stop-color="#ffe7a3"/><stop offset="0.28" stop-color="#fcd34d"/>
    <stop offset="0.30" stop-color="#fbbf24"/><stop offset="0.62" stop-color="#f59e0b"/>
    <stop offset="1" stop-color="#b45309"/>
  </linearGradient>
  <linearGradient id="metalEdge" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#7c3a06"/><stop offset="1" stop-color="#3d1d05"/>
  </linearGradient>
  <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
    <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.10"/>
    <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
  <!-- visor -->
  <linearGradient id="visor" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0b1426"/><stop offset="1" stop-color="#020611"/>
  </linearGradient>
  <radialGradient id="eye" cx="0.5" cy="0.4" r="0.6">
    <stop offset="0" stop-color="#fff7e0"/><stop offset="0.5" stop-color="#fcd34d"/><stop offset="1" stop-color="#f59e0b"/>
  </radialGradient>
  <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/><stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
  <filter id="softshadow" x="-40%" y="-40%" width="180%" height="180%">
    <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#000000" flood-opacity="0.55"/>
  </filter>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="14"/>
  </filter>
  <clipPath id="headclip"><path d="M312 300 H712 a96 96 0 0 1 96 96 V610 a120 120 0 0 1 -120 120 H336 a120 120 0 0 1 -120 -120 V396 a96 96 0 0 1 96 -96 Z"/></clipPath>
  <clipPath id="tileclip"><rect x="0" y="0" width="1024" height="1024" rx="236"/></clipPath>
</defs>

<!-- TILE -->
<rect x="0" y="0" width="1024" height="1024" rx="236" fill="url(#tile)"/>
<g clip-path="url(#tileclip)">
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bgglow)"/>
  <!-- top rim light -->
  <rect x="0" y="0" width="1024" height="6" fill="#ffffff" opacity="0.10"/>
  <!-- grid hint for tech feel -->
  <g stroke="#7dd3fc" stroke-opacity="0.05" stroke-width="2">
    <line x1="0" y1="820" x2="1024" y2="820"/><line x1="0" y1="900" x2="1024" y2="900"/>
  </g>
</g>

<!-- antenna -->
<g filter="url(#softshadow)">
  <rect x="497" y="214" width="30" height="78" rx="15" fill="url(#metal)"/>
</g>
<circle cx="512" cy="206" r="30" fill="url(#eye)" filter="url(#glow)" opacity="0.9"/>
<circle cx="512" cy="206" r="22" fill="url(#eye)"/>
<circle cx="505" cy="199" r="7" fill="#fffdf5"/>

<!-- side sensors -->
<g filter="url(#softshadow)">
  <rect x="176" y="470" width="58" height="150" rx="28" fill="url(#metalEdge)"/>
  <rect x="170" y="458" width="58" height="150" rx="28" fill="url(#metal)"/>
  <rect x="790" y="470" width="58" height="150" rx="28" fill="url(#metalEdge)"/>
  <rect x="796" y="458" width="58" height="150" rx="28" fill="url(#metal)"/>
</g>

<!-- HEAD: extrude base then face -->
<g filter="url(#softshadow)">
  <path d="M312 312 H712 a96 96 0 0 1 96 96 V622 a120 120 0 0 1 -120 120 H336 a120 120 0 0 1 -120 -120 V408 a96 96 0 0 1 96 -96 Z" fill="url(#metalEdge)"/>
</g>
<path d="M312 300 H712 a96 96 0 0 1 96 96 V610 a120 120 0 0 1 -120 120 H336 a120 120 0 0 1 -120 -120 V396 a96 96 0 0 1 96 -96 Z" fill="url(#metal)"/>
<!-- head sheen -->
<g clip-path="url(#headclip)">
  <ellipse cx="430" cy="320" rx="360" ry="190" fill="url(#sheen)" opacity="0.5"/>
  <rect x="216" y="300" width="592" height="14" fill="#ffffff" opacity="0.45"/>
</g>

<!-- VISOR -->
<rect x="300" y="372" width="424" height="266" rx="118" fill="url(#visor)"/>
<rect x="300" y="372" width="424" height="266" rx="118" fill="none" stroke="#000000" stroke-opacity="0.5" stroke-width="6"/>
<!-- visor glass reflection -->
<path d="M330 392 H694 a92 92 0 0 1 0 6 H330 Z" fill="none"/>
<rect x="322" y="384" width="380" height="120" rx="80" fill="url(#glass)"/>

<!-- EYES -->
<g>
  <circle cx="430" cy="500" r="58" fill="url(#eye)" filter="url(#glow)" opacity="0.7"/>
  <circle cx="594" cy="500" r="58" fill="url(#eye)" filter="url(#glow)" opacity="0.7"/>
  <circle cx="430" cy="500" r="44" fill="url(#eye)"/>
  <circle cx="594" cy="500" r="44" fill="url(#eye)"/>
  <circle cx="417" cy="487" r="14" fill="#fffdf5"/>
  <circle cx="581" cy="487" r="14" fill="#fffdf5"/>
</g>
<!-- mouth scan line -->
<rect x="455" y="600" width="114" height="14" rx="7" fill="#f59e0b" opacity="0.85"/>
</svg>