<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220" role="img" aria-label="Wheel diagram with diameter labelled">
  <rect x="20" y="180" width="280" height="6" fill="#475569"/>
  <circle cx="160" cy="120" r="60" fill="#1f2937" stroke="#3b82f6" stroke-width="4"/>
  <circle cx="160" cy="120" r="14" fill="#fde047"/>
  <g stroke="#fde047" stroke-width="2">
    <line x1="160" y1="120" x2="160" y2="66"/>
    <line x1="160" y1="120" x2="160" y2="174"/>
    <line x1="160" y1="120" x2="214" y2="120"/>
    <line x1="160" y1="120" x2="106" y2="120"/>
  </g>
  <!-- diameter label -->
  <g font-family="sans-serif" font-weight="800" font-size="14" fill="#fde047">
    <line x1="106" y1="60" x2="214" y2="60" stroke="#fde047" stroke-width="2" marker-end="url(#ar)" marker-start="url(#ar)"/>
    <text x="160" y="50" text-anchor="middle">10 cm</text>
    <text x="160" y="210" text-anchor="middle">5 turns →</text>
  </g>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#fde047"/>
    </marker>
  </defs>
</svg>
