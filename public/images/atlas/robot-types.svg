<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="Humanoid robot wireframe silhouette">
  <rect width="800" height="400" fill="#050810"/>
  <g stroke="#00B8D4" fill="none">
    <g opacity="0.18" stroke-width="1">
      <path d="M0 80 H800 M0 160 H800 M0 240 H800 M0 320 H800"/>
      <path d="M100 0 V400 M300 0 V400 M500 0 V400 M700 0 V400"/>
    </g>
    <g stroke-width="1.6" transform="translate(400,200)">
      <!-- head -->
      <rect x="-30" y="-150" width="60" height="50" rx="6"/>
      <line x1="-15" y1="-130" x2="-5" y2="-130"/>
      <line x1="5" y1="-130" x2="15" y2="-130"/>
      <line x1="-12" y1="-115" x2="12" y2="-115" opacity="0.6"/>
      <!-- neck -->
      <line x1="0" y1="-100" x2="0" y2="-90"/>
      <!-- shoulders -->
      <line x1="-60" y1="-85" x2="60" y2="-85"/>
      <circle cx="-60" cy="-85" r="6"/>
      <circle cx="60" cy="-85" r="6"/>
      <!-- arms -->
      <line x1="-60" y1="-79" x2="-90" y2="-20"/>
      <circle cx="-90" cy="-20" r="5"/>
      <line x1="-90" y1="-15" x2="-80" y2="50"/>
      <circle cx="-80" cy="55" r="6" fill="#050810"/>
      <line x1="60" y1="-79" x2="90" y2="-20"/>
      <circle cx="90" cy="-20" r="5"/>
      <line x1="90" y1="-15" x2="80" y2="50"/>
      <circle cx="80" cy="55" r="6" fill="#050810"/>
      <!-- torso -->
      <path d="M-50,-80 L50,-80 L46,30 L-46,30 Z"/>
      <line x1="0" y1="-80" x2="0" y2="30" opacity="0.5"/>
      <line x1="-46" y1="-30" x2="46" y2="-30" opacity="0.4" stroke-dasharray="3 4"/>
      <!-- hips -->
      <line x1="-46" y1="30" x2="46" y2="30"/>
      <circle cx="-26" cy="30" r="5"/>
      <circle cx="26" cy="30" r="5"/>
      <!-- legs -->
      <line x1="-26" y1="35" x2="-32" y2="100"/>
      <circle cx="-32" cy="100" r="5"/>
      <line x1="-32" y1="105" x2="-32" y2="170"/>
      <line x1="-48" y1="175" x2="-16" y2="175"/>
      <line x1="26" y1="35" x2="32" y2="100"/>
      <circle cx="32" cy="100" r="5"/>
      <line x1="32" y1="105" x2="32" y2="170"/>
      <line x1="16" y1="175" x2="48" y2="175"/>
    </g>
  </g>
  <g font-family="'JetBrains Mono', monospace" fill="#E8ECF1" font-size="12" letter-spacing="3">
    <text x="40" y="50">ROBOT TYPES · HUMANOID</text>
  </g>
  <g font-family="'JetBrains Mono', monospace" fill="#00B8D4" font-size="10" letter-spacing="2" opacity="0.7">
    <text x="660" y="50">28 DOF</text>
  </g>
</svg>
