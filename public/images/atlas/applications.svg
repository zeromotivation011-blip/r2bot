<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="City and environment wireframe">
  <rect width="800" height="400" fill="#050810"/>
  <g stroke="#00B8D4" fill="none">
    <g opacity="0.18" stroke-width="1">
      <path d="M0 80 H800 M0 160 H800 M0 240 H800 M0 320 H800"/>
      <path d="M100 0 V400 M300 0 V400 M500 0 V400 M700 0 V400"/>
    </g>
    <g stroke-width="1.4">
      <!-- ground line -->
      <line x1="0" y1="320" x2="800" y2="320"/>
      <!-- buildings -->
      <rect x="60" y="200" width="80" height="120"/>
      <line x1="80" y1="220" x2="80" y2="310" opacity="0.5"/>
      <line x1="100" y1="220" x2="100" y2="310" opacity="0.5"/>
      <line x1="120" y1="220" x2="120" y2="310" opacity="0.5"/>
      <line x1="60" y1="240" x2="140" y2="240" opacity="0.5"/>
      <line x1="60" y1="270" x2="140" y2="270" opacity="0.5"/>
      <line x1="60" y1="300" x2="140" y2="300" opacity="0.5"/>
      <rect x="160" y="140" width="70" height="180"/>
      <line x1="180" y1="160" x2="180" y2="310" opacity="0.5"/>
      <line x1="200" y1="160" x2="200" y2="310" opacity="0.5"/>
      <line x1="160" y1="180" x2="230" y2="180" opacity="0.5"/>
      <line x1="160" y1="220" x2="230" y2="220" opacity="0.5"/>
      <line x1="160" y1="260" x2="230" y2="260" opacity="0.5"/>
      <line x1="160" y1="300" x2="230" y2="300" opacity="0.5"/>
      <rect x="250" y="100" width="90" height="220"/>
      <line x1="270" y1="120" x2="270" y2="310" opacity="0.5"/>
      <line x1="295" y1="120" x2="295" y2="310" opacity="0.5"/>
      <line x1="320" y1="120" x2="320" y2="310" opacity="0.5"/>
      <line x1="250" y1="160" x2="340" y2="160" opacity="0.5"/>
      <line x1="250" y1="200" x2="340" y2="200" opacity="0.5"/>
      <line x1="250" y1="240" x2="340" y2="240" opacity="0.5"/>
      <line x1="250" y1="280" x2="340" y2="280" opacity="0.5"/>
      <rect x="360" y="170" width="60" height="150"/>
      <rect x="440" y="120" width="100" height="200"/>
      <line x1="460" y1="140" x2="460" y2="310" opacity="0.5"/>
      <line x1="485" y1="140" x2="485" y2="310" opacity="0.5"/>
      <line x1="510" y1="140" x2="510" y2="310" opacity="0.5"/>
      <line x1="440" y1="170" x2="540" y2="170" opacity="0.5"/>
      <line x1="440" y1="220" x2="540" y2="220" opacity="0.5"/>
      <line x1="440" y1="270" x2="540" y2="270" opacity="0.5"/>
      <rect x="560" y="180" width="70" height="140"/>
      <rect x="650" y="150" width="80" height="170"/>
      <line x1="670" y1="170" x2="670" y2="310" opacity="0.5"/>
      <line x1="690" y1="170" x2="690" y2="310" opacity="0.5"/>
      <line x1="710" y1="170" x2="710" y2="310" opacity="0.5"/>
      <line x1="650" y1="200" x2="730" y2="200" opacity="0.5"/>
      <line x1="650" y1="240" x2="730" y2="240" opacity="0.5"/>
      <line x1="650" y1="280" x2="730" y2="280" opacity="0.5"/>
      <!-- drone -->
      <g transform="translate(620,90)">
        <line x1="-22" y1="0" x2="22" y2="0"/>
        <line x1="0" y1="-12" x2="0" y2="12"/>
        <circle cx="-22" cy="0" r="4"/>
        <circle cx="22" cy="0" r="4"/>
        <circle cx="0" cy="-12" r="4"/>
        <circle cx="0" cy="12" r="4"/>
        <line x1="0" y1="12" x2="-30" y2="60" stroke-dasharray="2 4" opacity="0.6"/>
      </g>
      <!-- ground robot -->
      <g transform="translate(380,300)">
        <rect x="-20" y="-20" width="40" height="20"/>
        <circle cx="-14" cy="5" r="6" fill="#050810"/>
        <circle cx="14" cy="5" r="6" fill="#050810"/>
        <line x1="0" y1="-20" x2="0" y2="-35"/>
        <circle cx="0" cy="-40" r="4"/>
      </g>
      <!-- horizon arc -->
      <path d="M0 360 Q400 340 800 360" opacity="0.5" stroke-dasharray="2 6"/>
    </g>
  </g>
  <g font-family="'JetBrains Mono', monospace" fill="#E8ECF1" font-size="12" letter-spacing="3">
    <text x="40" y="50">APPLICATIONS · WORLD</text>
  </g>
