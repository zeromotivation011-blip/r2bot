<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="Neural network node diagram">
  <rect width="800" height="400" fill="#050810"/>
  <g stroke="#00B8D4" fill="none">
    <g opacity="0.18" stroke-width="1">
      <path d="M0 80 H800 M0 160 H800 M0 240 H800 M0 320 H800"/>
      <path d="M100 0 V400 M300 0 V400 M500 0 V400 M700 0 V400"/>
    </g>
    <g stroke-width="0.8" opacity="0.45">
      <!-- input to hidden1 -->
      <line x1="160" y1="120" x2="320" y2="100"/>
      <line x1="160" y1="120" x2="320" y2="180"/>
      <line x1="160" y1="120" x2="320" y2="260"/>
      <line x1="160" y1="120" x2="320" y2="340"/>
      <line x1="160" y1="220" x2="320" y2="100"/>
      <line x1="160" y1="220" x2="320" y2="180"/>
      <line x1="160" y1="220" x2="320" y2="260"/>
      <line x1="160" y1="220" x2="320" y2="340"/>
      <line x1="160" y1="320" x2="320" y2="100"/>
      <line x1="160" y1="320" x2="320" y2="180"/>
      <line x1="160" y1="320" x2="320" y2="260"/>
      <line x1="160" y1="320" x2="320" y2="340"/>
      <!-- hidden1 to hidden2 -->
      <line x1="320" y1="100" x2="480" y2="100"/>
      <line x1="320" y1="100" x2="480" y2="180"/>
      <line x1="320" y1="100" x2="480" y2="260"/>
      <line x1="320" y1="100" x2="480" y2="340"/>
      <line x1="320" y1="180" x2="480" y2="100"/>
      <line x1="320" y1="180" x2="480" y2="180"/>
      <line x1="320" y1="180" x2="480" y2="260"/>
      <line x1="320" y1="180" x2="480" y2="340"/>
      <line x1="320" y1="260" x2="480" y2="100"/>
      <line x1="320" y1="260" x2="480" y2="180"/>
      <line x1="320" y1="260" x2="480" y2="260"/>
      <line x1="320" y1="260" x2="480" y2="340"/>
      <line x1="320" y1="340" x2="480" y2="100"/>
      <line x1="320" y1="340" x2="480" y2="180"/>
      <line x1="320" y1="340" x2="480" y2="260"/>
      <line x1="320" y1="340" x2="480" y2="340"/>
      <!-- hidden2 to output -->
      <line x1="480" y1="100" x2="640" y2="180"/>
      <line x1="480" y1="100" x2="640" y2="260"/>
      <line x1="480" y1="180" x2="640" y2="180"/>
      <line x1="480" y1="180" x2="640" y2="260"/>
      <line x1="480" y1="260" x2="640" y2="180"/>
      <line x1="480" y1="260" x2="640" y2="260"/>
      <line x1="480" y1="340" x2="640" y2="180"/>
      <line x1="480" y1="340" x2="640" y2="260"/>
    </g>
    <g fill="#050810" stroke-width="1.6">
      <circle cx="160" cy="120" r="14"/>
      <circle cx="160" cy="220" r="14"/>
      <circle cx="160" cy="320" r="14"/>
      <circle cx="320" cy="100" r="14"/>
      <circle cx="320" cy="180" r="14"/>
      <circle cx="320" cy="260" r="14"/>
      <circle cx="320" cy="340" r="14"/>
      <circle cx="480" cy="100" r="14"/>
      <circle cx="480" cy="180" r="14"/>
      <circle cx="480" cy="260" r="14"/>
      <circle cx="480" cy="340" r="14"/>
      <circle cx="640" cy="180" r="14" fill="#00B8D4"/>
      <circle cx="640" cy="260" r="14" fill="#00B8D4"/>
    </g>
  </g>
  <g font-family="'JetBrains Mono', monospace" fill="#E8ECF1" font-size="12" letter-spacing="3">
    <text x="40" y="50">AI · NEURAL NETWORK</text>
  </g>
  <g font-family="'JetBrains Mono', monospace" fill="#00B8D4" font-size="10" letter-spacing="2" opacity="0.7">
    <text x="135" y="80">in</text>
    <text x="295" y="80">h₁</text>
    <text x="455" y="80">h₂</text>
    <text x="615" y="160">out</text>
  </g>
</svg>
