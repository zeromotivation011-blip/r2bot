<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="Sense-Think-Act loop diagram">
  <rect width="800" height="400" fill="#050810"/>
  <g stroke="#00B8D4" stroke-width="1.25" fill="none" opacity="0.18">
    <path d="M0 80 H800 M0 160 H800 M0 240 H800 M0 320 H800"/>
    <path d="M100 0 V400 M300 0 V400 M500 0 V400 M700 0 V400"/>
  </g>
  <g transform="translate(400,200)">
    <g stroke="#00B8D4" stroke-width="1.6" fill="none">
      <path d="M-208,-90 A150,150 0 0 1 208,-90" />
      <path d="M208,-90 A150,150 0 0 1 0,180" />
      <path d="M0,180 A150,150 0 0 1 -208,-90" />
      <polyline points="200,-105 215,-90 195,-80" stroke-linejoin="round" stroke-linecap="round"/>
      <polyline points="15,170 0,182 -15,170" stroke-linejoin="round" stroke-linecap="round"/>
      <polyline points="-215,-90 -200,-105 -180,-80" stroke-linejoin="round" stroke-linecap="round"/>
    </g>
    <g font-family="'Space Grotesk', sans-serif" font-weight="600" text-anchor="middle">
      <g transform="translate(-208,-110)">
        <circle r="62" fill="#050810" stroke="#00B8D4" stroke-width="1.8"/>
        <text fill="#E8ECF1" font-size="22" y="-4">Sense</text>
        <text fill="#00B8D4" font-size="11" y="20" letter-spacing="2">01</text>
      </g>
      <g transform="translate(208,-110)">
        <circle r="62" fill="#050810" stroke="#00B8D4" stroke-width="1.8"/>
        <text fill="#E8ECF1" font-size="22" y="-4">Think</text>
        <text fill="#00B8D4" font-size="11" y="20" letter-spacing="2">02</text>
      </g>
      <g transform="translate(0,140)">
        <circle r="62" fill="#050810" stroke="#00B8D4" stroke-width="1.8"/>
        <text fill="#E8ECF1" font-size="22" y="-4">Act</text>
        <text fill="#00B8D4" font-size="11" y="20" letter-spacing="2">03</text>
      </g>
    </g>
  </g>
