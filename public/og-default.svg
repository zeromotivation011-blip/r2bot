<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(0,184,212,0.08)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="rgba(0,184,212,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,184,212,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand wordmark -->
  <text x="80" y="240" font-family="Inter, sans-serif" font-weight="800" font-size="180" fill="#f59e0b">
    R<tspan fill="#00B8D4">2</tspan>BOT
  </text>

  <!-- Tagline -->
  <text x="80" y="310" font-family="Inter, sans-serif" font-weight="600" font-size="38" fill="#E1E7EE">
    Learn Robotics in India.
  </text>
  <text x="80" y="360" font-family="JetBrains Mono, monospace" font-size="22" fill="#94A3B8">
    From zero to ROS2 engineer. Free lessons, real projects, India jobs.
  </text>

  <!-- Stats row -->
  <g transform="translate(80, 460)" font-family="JetBrains Mono, monospace" fill="#C8D0DC">
    <text font-size="22">⚡  13 lessons</text>
    <text x="240" font-size="22">🔌  4 tracks</text>
    <text x="430" font-size="22">🇮🇳  India-first</text>
    <text x="720" font-size="22">🏆  Free to start</text>
  </g>

  <!-- Footer URL -->
  <text x="80" y="570" font-family="JetBrains Mono, monospace" font-size="20" fill="#475569">
    robot-tan.vercel.app
  </text>

  <!-- Decorative circuit -->
  <g stroke="#00B8D4" stroke-width="2" fill="none" opacity="0.5" transform="translate(940, 380)">
    <circle cx="0" cy="0" r="12" fill="#00B8D4" stroke="none"/>
    <circle cx="120" cy="40" r="6"/>
    <circle cx="180" cy="-50" r="6"/>
    <circle cx="80" cy="120" r="6"/>
    <path d="M 0 0 L 120 40 M 0 0 L 180 -50 M 0 0 L 80 120"/>
  </g>
</svg>
